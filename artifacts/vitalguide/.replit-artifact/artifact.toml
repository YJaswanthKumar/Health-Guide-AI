kind = "web"
previewPath = "/"
title = "VitalGuide"
version = "1.0.0"
id = "artifacts/vitalguide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22608

[services.development]
run = "pnpm --filter @workspace/vitalguide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vitalguide", "run", "build" ]
publicDir = "artifacts/vitalguide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22608"
BASE_PATH = "/"
